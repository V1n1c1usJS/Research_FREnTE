<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-label="Savannah river-first figure"><rect x="0" y="0" width="1200" height="560" rx="12" fill="#F8FAFC" stroke="none" /><text x="70" y="70" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#011E42" text-anchor="start">Bridge from river signal to the Thurmond sediment interpretation</text><text x="70" y="100" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="400" fill="#64748B" text-anchor="start">Narrative order: mainstem hydrology first, river chemistry second, reservoir modulation third, sediment interpretation last</text><rect x="90" y="180" width="240" height="170" rx="12" fill="#FFFFFF" stroke="#E2E8F0" /><text x="210.0" y="224" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#011E42" text-anchor="middle">Mainstem hydrology</text><text x="210.0" y="268" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#0F7B5F" text-anchor="middle">2 long-horizon USGS sites</text><text x="210.0" y="298" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#64748B" text-anchor="middle">20-year target met</text><rect x="370" y="180" width="240" height="170" rx="12" fill="#FFFFFF" stroke="#E2E8F0" /><text x="490.0" y="224" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#011E42" text-anchor="middle">River chemistry</text><text x="490.0" y="268" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#C27803" text-anchor="middle">3 WQP sites</text><text x="490.0" y="298" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#64748B" text-anchor="middle">real but patchy</text><rect x="650" y="180" width="240" height="170" rx="12" fill="#FFFFFF" stroke="#E2E8F0" /><text x="770.0" y="224" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#011E42" text-anchor="middle">Reservoir modulation</text><text x="770.0" y="268" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#87714D" text-anchor="middle">3 reservoir controls</text><text x="770.0" y="298" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#64748B" text-anchor="middle">annex layer</text><rect x="930" y="180" width="180" height="170" rx="12" fill="#FFFFFF" stroke="#E2E8F0" /><text x="1020.0" y="224" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#011E42" text-anchor="middle">Sediment target</text><text x="1020.0" y="268" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#011E42" text-anchor="middle">Thurmond</text><text x="1020.0" y="298" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#64748B" text-anchor="middle">final interpretation</text><line x1="330" y1="265" x2="370" y2="265" stroke="#0F7B5F" stroke-width="8" /><line x1="610" y1="265" x2="650" y2="265" stroke="#C27803" stroke-width="8" /><line x1="890" y1="265" x2="930" y2="265" stroke="#87714D" stroke-width="8" /><text x="350" y="242" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#011E42" text-anchor="middle">supports</text><text x="630" y="242" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#011E42" text-anchor="middle">is regulated by</text><text x="910" y="242" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#011E42" text-anchor="middle">reaches</text><rect x="70" y="430" width="1060" height="64" rx="16" fill="#E0F2FE" stroke="#BFDBFE" /><text x="100" y="466" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="600" fill="#011E42" text-anchor="start">The study target remains the sediment interpretation at Thurmond, but the explanatory path now starts from the river and only then crosses the regulating cascade.</text></svg>