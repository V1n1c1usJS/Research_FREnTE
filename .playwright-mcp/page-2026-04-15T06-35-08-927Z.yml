          - paragraph [ref=e395]: Specific conductance (µS/cm, orange) and turbidity (FNU, red) in separate panels. Conductance is a proxy for total ionic load — it drops when the river dilutes during flood events. Turbidity responds to discharge pulses that resuspend fine particles.
        - generic [ref=e396]:
          - paragraph [ref=e397]:
            - generic [ref=e398]: lightbulb
            - text: Why it matters
          - paragraph [ref=e399]: Conductance is the cleanest dilution tracer in the dataset (r = −0.79 with Augusta discharge). When the river is high, conductance drops — indicating dissolved ions (including Fe²⁺ and Mn²⁺) are being diluted and transported. Turbidity, in turn, marks episodes of fine particle transport — exactly the material that settles in the low-energy zones of Clarks Hill reservoir.
        - generic [ref=e400]:
          - paragraph [ref=e401]:
            - generic [ref=e402]: flag
            - text: Takeaway
          - paragraph [ref=e403]: "Conductance and discharge are inversely coupled — every flood peak produces a conductance depression. Turbidity has more pronounced episodic spikes than the moving average reveals: extreme turbidity events are the sediment recharge episodes for the reservoir."
