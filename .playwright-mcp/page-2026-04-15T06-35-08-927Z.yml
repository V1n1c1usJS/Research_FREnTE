          - paragraph [ref=e436]: Conductance (r ≈ −0.79) is the parameter most mechanistically coupled to discharge — it is the dilution tracer of the system. DO and temperature show weaker coupling because other factors intervene. Turbidity correlates positively with discharge, confirming that flood pulses are the vectors of fine particle transport into Clarks Hill.
