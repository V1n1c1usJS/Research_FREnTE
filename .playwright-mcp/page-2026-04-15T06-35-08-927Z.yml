          - paragraph [ref=e286]: Peak in March, minimum in September–October. Spread between years is greatest in winter–spring (when floods vary most) and smallest in summer (a more predictable low-flow period). The critical window for DO depletion and Mn mobilization coincides with the summer flow minimum.
