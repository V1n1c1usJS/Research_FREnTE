          - paragraph [ref=e367]: "Two independent panels: water temperature (°C, green) and dissolved oxygen (mg/L, blue), both at USACE Dock gauge (021989773). The dashed red line in the DO panel marks the critical threshold of 5 mg/L — below this value, suboxic conditions promote reductive mobilization of Fe and Mn from sediments."
        - generic [ref=e368]:
          - paragraph [ref=e369]:
            - generic [ref=e370]: lightbulb
            - text: Why it matters
          - paragraph [ref=e371]: DO and temperature are the parameters with the most direct geochemical relevance. In warm summers with low discharge (Thurmond releasing less), DO can drop below 5 mg/L. Under these conditions, Fe²⁺ and Mn²⁺ become soluble and migrate into the water column — the same iron and manganese that, upon re-oxidation and precipitation, form the metal-enriched deposits in the Clarks Hill sediment cores.
        - generic [ref=e372]:
