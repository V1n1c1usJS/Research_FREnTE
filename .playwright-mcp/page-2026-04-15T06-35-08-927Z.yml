            - generic [ref=e374]: flag
            - text: Takeaway
          - paragraph [ref=e375]: "DO shows clear seasonality: summer minima (July–September) and winter maxima. Depression below 5 mg/L occurs in drought years. Temperature follows the expected seasonal cycle, ranging from ~8°C to ~28°C annually. The mechanistic link temperature → DO → Mn mobilization is the bridge connecting river behavior to the sediment record."
