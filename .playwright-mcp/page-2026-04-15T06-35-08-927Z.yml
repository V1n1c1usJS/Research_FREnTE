            - generic [ref=e431]: lightbulb
            - text: Why it matters
          - paragraph [ref=e432]: This is the central quantitative cross-analysis of the report. The strong negative correlation between discharge and conductance (r = −0.79) confirms that the river dilutes its ionic load during flood events. The DO–discharge relationship is weaker because DO also depends on temperature and organic matter decomposition — factors independent of flow. Each r value here has a direct implication for metal transport and sediment geochemistry.
        - generic [ref=e433]:
