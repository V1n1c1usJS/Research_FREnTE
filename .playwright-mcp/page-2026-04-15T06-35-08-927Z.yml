          - paragraph [ref=e282]: The Savannah peaks hydrologically in March and reaches its minimum in September–October. This seasonal rhythm controls when low-DO pulses occur (summer–fall), when turbidity rises (spring), and when reservoir recharge happens. Understanding the seasonal pattern is a prerequisite for interpreting any water quality or sediment data.
