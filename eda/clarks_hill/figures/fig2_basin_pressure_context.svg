<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-label="Savannah river-first figure"><rect x="0" y="0" width="1200" height="560" rx="12" fill="#F8FAFC" stroke="none" /><text x="70" y="68" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#011E42" text-anchor="start">Basin and pressure context</text><text x="70" y="98" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="400" fill="#64748B" text-anchor="start">Second narrative layer: contextual readiness for basin pressures without promoting reservoir operations to protagonist status</text><rect x="70" y="150" width="320" height="150" rx="12" fill="#FFFFFF" stroke="#E2E8F0" /><text x="100" y="188" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#011E42" text-anchor="start">Monitoring intensity</text><text x="100" y="222" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#87714D" text-anchor="start">44,644 WQP results returned</text><text x="100" y="252" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#64748B" text-anchor="start">across the three forebay monitoring sites</text><rect x="430" y="150" width="320" height="150" rx="12" fill="#FFFFFF" stroke="#E2E8F0" /><text x="460" y="188" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#011E42" text-anchor="start">Comparative pressure proxies</text><text x="460" y="222" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#87714D" text-anchor="start">8 parameter groups</text><text x="460" y="252" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#64748B" text-anchor="start">available for basin-pressure interpretation</text><rect x="790" y="150" width="320" height="150" rx="12" fill="#FFFFFF" stroke="#E2E8F0" /><text x="820" y="188" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#011E42" text-anchor="start">Context sources already seeded</text><text x="820" y="222" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#87714D" text-anchor="start">Landscape, bathymetry, basin reports</text><text x="820" y="252" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#64748B" text-anchor="start">available as pressure-context references</text><rect x="70" y="350" width="1060" height="140" rx="12" fill="#F8FAFC" stroke="#E2E8F0" /><text x="100" y="392" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#011E42" text-anchor="start">Interpretation rule</text><text x="100" y="426" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#64748B" text-anchor="start">Use basin and pressure context to explain the river signal, not to replace it.</text><text x="100" y="458" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="500" fill="#64748B" text-anchor="start">Reservoir operations should only enter after this layer, and only where the crossing is analytically justified.</text><text x="100" y="486" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#64748B" text-anchor="start">This is intentionally a status panel because the pressure layer is still less mature than the current river-monitoring layer.</text></svg>