# ============================================================
# Savannah River mainstem system - Research context for Research_FREnTE
# Study: Comprehensive Characterization of Lake Floor Sediments
# GSA 2026 Triple Joint Section Meeting
# ============================================================

context_id: ctx-savannah-river-mainstem-v3

article_goal: >
  Characterize the behavior of the Savannah River mainstem across the Hartwell-
  Russell-Thurmond corridor (Georgia-South Carolina, USA) using the same analytical
  logic adopted for the Rio Tiete: the river is the protagonist, environmental
  pressures and pollutant context are part of the core reading, reservoir operations
  are supporting explanatory variables embedded in the river system, and sediment
  interpretation comes at the end as the response layer. The objective is to explain
  how river flow, stage, water quality, suspended sediment, pollutant pressures, and
  coordinated upstream regulation shape the hydrodynamic and biogeochemical setting
  that ultimately controls fine-sediment deposition zones, iron enrichment, and
  organic carbon stabilization in J. Strom Thurmond Reservoir. This context exists
  to support the sediment-focused scientific question of the GSA deck, not to
  replace it with a reservoir-operations-only narrative.

geographic_scope:
  # --- River system and embedded reservoirs ---
  - "Savannah River mainstem corridor with the federal reservoir cascade Hartwell Lake -> Richard B. Russell Lake -> J. Strom Thurmond Reservoir"
  - "Primary sediment-study reservoir: Clarks Hill Lake / J. Strom Thurmond Reservoir, GA-SC border"
  - "Upstream operational controls: Hartwell Dam and Richard B. Russell Dam"
  - "Thurmond Dam location: Clarks Hill, South Carolina (33.66N, 82.19W)"
  - "Thurmond surface area at full pool: ~287 km2 (71,000 acres)"
  - "Thurmond full pool elevation: 330 ft MSL (100.6 m)"
  - "Thurmond maximum depth: ~43 m; mean depth: ~6 m"

  # --- Watershed ---
  - "Savannah River basin upstream of Thurmond Dam, including Hartwell and Russell control points"
  - "Drainage area above Thurmond Dam: ~14,000 km2 (5,400 sq mi)"
  - "States: Georgia (majority), South Carolina, western North Carolina (headwaters)"
  - "Major tributaries: Little River (GA), Stevens Creek (SC), Rocky River (GA)"

  # --- Key operational and monitoring locations ---
  - "USACE / NID records for Hartwell Dam, Richard B. Russell Dam, and J. Strom Thurmond Dam"
  - "Mainstem Savannah River reaches above Hartwell, between Hartwell and Russell, between Russell and Thurmond, and below Thurmond toward Augusta"
  - "USGS 02193900 - monitoring location on Savannah River basin (preferred source for Thurmond context)"
  - "NWS SERFC station CHDS1 - Clarks Hill Dam inflow forecasts (preferred source)"
  - "Nearest major city: Augusta, GA (downstream of dam)"

  # --- Sampling area (sediment study) ---
  - "23 surface sediment sampling sites distributed across the lake"
  - "Sites cover transition from fluvial to lacustrine depositional environments"

thematic_axes:
  # Level 1 - Regional physical context and pressures
  - Savannah River mainstem corridor and reach segmentation through the Hartwell-Russell-Thurmond cascade
  - reservoir physical characteristics (area, volume, depth, morphometry) as supporting context
  - Savannah River basin watershed delineation and land cover (NLCD)
  - regional climate and precipitation patterns (Georgia-South Carolina Piedmont)
  - watershed geology and soils (contributing to sediment and iron supply)
  - "pollutant and environmental pressure context affecting the river: wastewater, industrial discharges, impaired waters, agriculture, urban land use, and nonpoint-source loading"

  # Level 2 - River hydrology and supporting operations
  - mainstem Savannah River flow, stage, and level context above, between, and below the reservoirs
  - coordinated USACE operational data for Hartwell, Russell, and Thurmond (pool elevation, storage, inflow, outflow, releases) as supporting explanatory variables
  - seasonal hydrograph patterns, flood attenuation, and propagation of the river signal through the cascade
  - water residence time estimates for Thurmond conditioned by upstream regulation

  # Level 3 - Water quality, pollutants, and physicochemical conditions
  - historical water quality in Savannah River reaches and at mainstem monitoring points (DO, pH, temperature, turbidity, nutrients)
  - "pollutant-pressure datasets for the river corridor: NPDES/ECHO dischargers, impairments, TMDLs, watershed load indicators, and historical pressure signals"
  - "contaminant-history datasets and reports for the Savannah corridor: heavy metals, PAHs, PCBs, organochlorine pesticides, butyltins, PFAS, radionuclides, bacteria, and industrial particulates"
  - reservoir water quality at Hartwell, Russell, and Thurmond where available as supporting annexes
  - trophic status and algal bloom history
  - thermocline and stratification patterns
  - suspended sediment transport, suspended solids, and turbidity gradients along the mainstem

  # Level 4 - Hydrodynamic and sediment context (literature)
  - spatial variation in flow velocity across reservoir zones
  - depositional energy gradients from riverine to lacustrine zones
  - academic studies on the Hartwell-Russell-Thurmond system and Thurmond Lake sediment dynamics
  - comparable southeastern US reservoir studies on iron-organic matter coupling

preferred_sources:
  # Priority 1 - River signal (start here)
  - "USGS NWIS (https://waterdata.usgs.gov/nwis) - mainstem Savannah River streamflow, stage, sediment, and water-quality records"
  - "USGS monitoring location 02193900 (https://waterdata.usgs.gov/monitoring-location/USGS-02193900/) - continuous streamflow and water quality"
  - "USGS Water Quality Portal (https://www.waterqualitydata.us/) - river-reach and reservoir water chemistry"
  - "NWS SERFC Clarks Hill inflows (https://www.weather.gov/serfc/inflows_chds1) - real-time and historical inflow forecasts for CHDS1"
  - "EPA ECHO (https://echo.epa.gov/) - pollutant dischargers, permits, and compliance data affecting the river corridor"
  - "EPA ATTAINS (https://www.epa.gov/waterdata/attains) - impairments, uses, and TMDL context for Savannah River reaches"
  - "NOAA contaminant and sediment archives - historical heavy metals, PAHs, PCBs, pesticides, and biota contamination records for the Savannah corridor"
  - "Savannah Riverkeeper dashboards and reports - recent PFAS, E. coli, and river-quality concern signals"
  - "DOE / Savannah River Site monitoring reports - radionuclides, tritium, and remediation context affecting the river system"
  - "City of Savannah / Savannah Water Quality archive (https://savannahwaterquality.com/archive) - annual and quarterly treated-water and PFAS reports tied to the Savannah intake"
  - "City of Savannah / Savannah Water Quality PFAS page (https://savannahwaterquality.com/pfas) - recent PFAS context and downloadable public-facing reports"
  - "USGS additional mainstem and low-flow support stations such as 021973269 when they expose modern chemistry or flow context"
  - "ScienceBase / USGS Savannah 2020 releases - modern campaign chemistry for the lower Savannah"
  - "Clemson institutional reports on the middle and lower Savannah basin"

  # Priority 2 - USACE operational support
  - "USACE Savannah District Water Management (https://www.sas.usace.army.mil/) - official dam operations and water control manuals"
  - "USACE AquaLink / Water Control Data System (https://water.usace.army.mil/) - pool elevation, storage, inflow, outflow for Hartwell, Russell, and Thurmond"
  - "USACE National Inventory of Dams - structural records for Hartwell, Russell, and Thurmond"
  - "USACE project pages and manuals for Hartwell, Richard B. Russell, and J. Strom Thurmond"
  - "USACE / NOAA operational forecast products for the Savannah cascade"

  # Priority 3 - Basin and monitoring support
  - "USGS StreamStats - watershed delineation and basin characteristics"

  # Priority 4 - EPA and environmental monitoring
  - "EPA ECHO (https://echo.epa.gov/) - discharge permits, pollutant sources, and compliance history"
  - "EPA ATTAINS (https://www.epa.gov/waterdata/attains) - waterbody assessment, impairments, and TMDLs"
  - "EPA STORET / WQP - historical water quality sampling data"

  # Priority 5 - Climate and land cover
  - "NOAA Climate Data Online (https://www.ncdc.noaa.gov/cdo-web/) - precipitation, temperature"
  - "NLCD (https://www.mrlc.gov/) - National Land Cover Database for watershed characterization"
  - "USGS EarthExplorer (https://earthexplorer.usgs.gov) - DEM, Landsat imagery"

  # Priority 6 - Academic literature
  - "Google Scholar - Hartwell Lake, Richard B. Russell Lake, J. Strom Thurmond Reservoir, Savannah River hydrology"
  - "USACE technical reports on Savannah system reservoir management"
  - "Southeastern US reservoir limnology and sediment studies"

expected_outputs:
  - "comparative time series for mainstem Savannah River flow and stage across the cascade (daily, target horizon: 20 years when available)"
  - "flow and level context near Augusta and below Thurmond (daily, target horizon: 20 years when available)"
  - suspended sediment, suspended solids, turbidity, or proxy records for the mainstem where available
  - "historical river water quality parameters: DO, pH, temperature, turbidity, nutrients, conductivity, and sediment-related proxies (target horizon: 20 years, prioritizing river reaches and using reservoir data as support)"
  - "pollutant and pressure layers affecting the river: dischargers, impairments, TMDLs, land-use pressure, and watershed loading indicators"
  - "contaminant-history layers for the river corridor: metals, organics, PFAS, radionuclides, bacteria, and sediment-contaminant evidence, preserving period-of-record and evidence type"
  - "modern pollutant-pressure layers for 2000-2026: PFAS reports, local dashboards, effluent violations, impaired reaches, and institutional chemistry campaigns tied to the mainstem"
  - "comparative time series of pool elevation and storage volume for Hartwell, Russell, and Thurmond as supporting annexes (daily, target horizon: 20 years when available)"
  - "inflow and outflow discharge records for the three-reservoir system as supporting explanatory variables embedded in the river narrative (daily, from USACE and USGS, target horizon: 20 years when available)"
  - watershed land cover summary from NLCD (forested vs agricultural vs developed)
  - reservoir morphometric parameters (area-volume-depth relationships) for the system
  - residence time estimates for Thurmond plus supporting upstream regulation context
  - references to algal bloom events and trophic status assessments
  - academic studies on Savannah system hydrodynamics, Thurmond sediment dynamics, or comparable southeastern reservoirs

exclusions:
  - recreational use reports without hydrological or water quality data
  - real estate or tourism content about the lake
  - sources without downloadable or queryable datasets
  - data from reservoirs outside the Savannah River system unless explicitly comparative
  - sources without institutional authorship (USACE, USGS, EPA, NOAA, universities)

