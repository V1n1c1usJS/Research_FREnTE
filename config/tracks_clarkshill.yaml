# ============================================================
# Clarks Hill Lake — Search tracks for Research_FREnTE
# Study: Reservoir characterization to support sediment analysis
# ============================================================
# Organization: 3 levels x ~3 tracks = 9 tracks total
# Priority: high > medium > low
# Suggested run: --max-searches 9 --limit 30 --llm-mode auto
# ============================================================

# ================================================================
# LEVEL 1 — PHYSICAL CONTEXT (MACRO)
# Basin characteristics, climate, and land cover
# ================================================================

- research_track: l1_basin_morphometry
  chat_label: chat-basin-morphometry
  search_profile: geospatial_data
  target_intent: dataset_discovery
  research_question: >
    What geospatial datasets are available to characterize the Clarks Hill Lake
    watershed, reservoir morphometry, and physical basin properties?
  task_prompt: >
    Search for watershed delineation data for the Savannah River basin above
    Clarks Hill Dam (drainage area ~14,000 km²).
    Find reservoir morphometric data: area-volume-depth (hypsometric) curves,
    bathymetric surveys, maximum and mean depth, shoreline length.
    Look for USGS StreamStats data for the Savannah River above the dam.
    Find DEM data (SRTM 30m or 3DEP 10m) covering the reservoir area.
    Look for any USACE technical reports on reservoir sedimentation surveys
    that include bathymetric data for Clarks Hill / J. Strom Thurmond Lake.
    Target sources: USGS StreamStats, USACE Savannah District reports,
    USGS EarthExplorer (earthexplorer.usgs.gov), USACE National Inventory of Dams.
    Also search: "J. Strom Thurmond reservoir morphometry" "Clarks Hill Lake bathymetry"
    "Savannah River basin delineation USGS".
  priority: high

- research_track: l1_land_cover_watershed
  chat_label: chat-nlcd-land-cover
  search_profile: geospatial_data
  target_intent: dataset_discovery
  research_question: >
    What land cover and land use data exist for the Savannah River watershed
    upstream of Clarks Hill Dam, and how has it changed over time?
  task_prompt: >
    Search for NLCD (National Land Cover Database) data covering the Savannah River
    basin upstream of Clarks Hill Dam.
    Target NLCD years: 2001, 2006, 2011, 2016, 2019, 2021 (change detection).
    Key land cover classes for this region: deciduous forest, evergreen forest,
    mixed forest, cultivated crops, pasture/hay, woody wetlands, developed areas.
    Find watershed-level land cover summaries if available (% forest, % agriculture).
    Search for Georgia and South Carolina agricultural statistics (USDA NASS)
    for counties in the watershed: McDuffie, Columbia, Lincoln, Wilkes (GA);
    McCormick, Edgefield (SC).
    Also look for USGS or USACE reports on non-point source pollution from
    agricultural areas in the watershed affecting Clarks Hill water quality.
    Target sources: MRLC.gov (NLCD), USDA NASS, Georgia DNR, SC DHEC.
    Queries: "NLCD Savannah River watershed" "land use Clarks Hill Lake watershed"
    "nonpoint source pollution Savannah River Georgia".
  priority: medium

- research_track: l1_climate_precipitation
  chat_label: chat-climate-precip
  search_profile: monitoring_sources
  target_intent: dataset_discovery
  research_question: >
    What long-term climate and precipitation data are available for the
    Clarks Hill Lake region (Georgia-South Carolina Piedmont)?
  task_prompt: >
    Search for precipitation and temperature records covering the Savannah River
    basin above Clarks Hill Dam.
    Target NOAA Climate Data Online (CDO) stations near the reservoir:
    Augusta, GA (GHCND:USW00003820), Clarks Hill, SC, McCormick, SC, Thomson, GA.
    Look for monthly and annual precipitation normals and anomalies (1991-2020 normal).
    Search for drought index data (PDSI, SPI) for the region — relevant for
    explaining pool elevation variability and low inflow periods.
    Find PRISM or Daymet gridded climate data for the watershed.
    Search for any studies linking precipitation patterns to reservoir inflow
    and pool level fluctuations at Clarks Hill.
    Target sources: NOAA CDO (ncdc.noaa.gov/cdo-web), PRISM Climate Group,
    Daymet (daymet.ornl.gov), SE Climate Consortium.
    Queries: "precipitation Savannah River basin" "drought Clarks Hill Lake"
    "Georgia Piedmont climate hydrology".
  priority: medium

# ================================================================
# LEVEL 2 — RESERVOIR OPERATIONS AND HYDROLOGY
# The hydrodynamic engine that controls depositional energy
# ================================================================

- research_track: l2_usace_operations
  chat_label: chat-usace-pool-storage
  search_profile: official_data_portals
  target_intent: dataset_discovery
  research_question: >
    What operational data (pool elevation, storage volume, inflow, outflow,
    releases) does USACE publish for Clarks Hill / J. Strom Thurmond Dam?
  task_prompt: >
    Search for USACE Savannah District water management data for Clarks Hill Dam.
    Find the official portal for daily pool elevation (ft MSL) and storage volume (acre-ft).
    Full pool elevation: 330 ft MSL; conservation pool: 320 ft MSL.
    Look for historical pool elevation records — ideally 10+ years daily data.
    Find inflow and outflow (powerhouse + spillway) discharge records.
    Search the USACE AquaLink Water Control Data System (water.usace.army.mil)
    for Clarks Hill / J. Strom Thurmond station codes and data download options.
    Find USACE Water Control Manual or Master Plan for the dam operations.
    Look for seasonal pool management patterns (summer vs winter pool targets).
    Target sources: sas.usace.army.mil (Savannah District),
    water.usace.army.mil (AquaLink), USACE published reports.
    Queries: "Clarks Hill Dam water control" "J. Strom Thurmond pool elevation data"
    "USACE Savannah District reservoir operations data download"
    "Clarks Hill Lake historical pool levels".
  priority: high

- research_track: l2_streamflow_inflows
  chat_label: chat-usgs-nws-inflows
  search_profile: monitoring_sources
  target_intent: dataset_discovery
  research_question: >
    What streamflow and inflow data are available from USGS and NWS for the
    Savannah River and its tributaries above Clarks Hill Dam?
  task_prompt: >
    START HERE: Examine the two preferred data endpoints for this study:
    1) NWS SERFC Clarks Hill Dam inflows: https://www.weather.gov/serfc/inflows_chds1
       — find what historical data format is available, download options, and time period.
    2) USGS monitoring location 02193900: https://waterdata.usgs.gov/monitoring-location/USGS-02193900/
       — identify the parameter codes available (discharge, stage, water quality),
       the period of record, and how to access data via USGS NWIS API.
    Also search for other USGS gauges on the Savannah River above Clarks Hill:
    — Savannah River near Calhoun Falls, SC (if available)
    — Little River tributaries in Georgia
    — Stevens Creek near Modoc, SC
    Find the USGS NWIS REST API endpoint for daily discharge data (parameter 00060)
    and stage data (parameter 00065) for station 02193900.
    Document the data format (JSON/RDB/CSV) and time series coverage.
    Target sources: waterdata.usgs.gov/nwis, water.weather.gov/ahps,
    https://www.weather.gov/serfc/inflows_chds1.
    Queries: "USGS 02193900 Savannah River discharge" "NWS SERFC CHDS1 inflow data"
    "Clarks Hill inflow historical USGS".
  priority: high

- research_track: l2_residence_time_hydrodynamics
  chat_label: chat-residence-time
  search_profile: academic_knowledge
  target_intent: contextual_intelligence
  research_question: >
    What is the estimated water residence time of Clarks Hill Lake, and how
    does it vary seasonally and spatially across the reservoir?
  task_prompt: >
    Search for published estimates of water residence time (hydraulic retention time)
    for Clarks Hill Lake / J. Strom Thurmond Reservoir.
    Formula reference: TR = Volume (m³) / Outflow (m³/day).
    Reservoir capacity: ~2.8 km³ (2.26 million acre-ft) at full pool.
    Look for studies that model spatial variation in residence time within the lake
    (riverine zone near inflow vs lacustrine zone near dam).
    Find USACE or academic studies on thermal stratification and mixing regimes
    in Clarks Hill — relevant to low-energy depositional zone identification.
    Search for hydrodynamic models applied to Clarks Hill (CE-QUAL-W2 or similar).
    Key concept for the research: low-energy zones (longer residence time) correspond
    to fine-sediment accumulation zones where iron and organic carbon concentrate.
    Target sources: Google Scholar, USACE technical reports, USGS Water Resources Investigation Reports.
    Queries: "Clarks Hill Lake residence time" "J. Strom Thurmond hydraulic retention"
    "Savannah River reservoir hydrodynamics stratification"
    "CE-QUAL-W2 Thurmond Lake" "Clarks Hill Lake mixing".
  priority: high

# ================================================================
# LEVEL 3 — WATER QUALITY AND ECOLOGICAL CONTEXT
# Physical and chemical conditions relevant to sediment biogeochemistry
# ================================================================

- research_track: l3_water_quality_historical
  chat_label: chat-water-quality-epa
  search_profile: monitoring_sources
  target_intent: dataset_discovery
  research_question: >
    What historical water quality data (DO, pH, temperature, turbidity, nutrients,
    chlorophyll-a) exist for Clarks Hill Lake monitoring stations?
  task_prompt: >
    Search the EPA Water Quality Portal (waterqualitydata.us) for sampling data
    at Clarks Hill Lake. Use site type "Lake, Reservoir, Impoundment" and
    location filter for Georgia/South Carolina near the reservoir.
    Find USGS NWIS water quality data (parameter codes: 00300 DO, 00400 pH,
    00010 temperature, 00076 turbidity, 00665 total phosphorus,
    00618 nitrate, 32209 chlorophyll-a) at or near Clarks Hill.
    Search for Georgia EPD (Environmental Protection Division) water quality
    monitoring data for Clarks Hill Lake.
    Search for SC DHEC (Department of Health and Environmental Control) water
    quality assessments for Clarks Hill Lake on the South Carolina side.
    Find any long-term trophic state assessments (TSI, Carlson's index)
    for Clarks Hill — trophic status is relevant to algal bloom concern noted in the study.
    Target sources: waterqualitydata.us, waterdata.usgs.gov/nwis,
    epd.georgia.gov, scdhec.gov.
    Queries: "Clarks Hill Lake water quality EPA" "J. Strom Thurmond reservoir DO nutrients"
    "Clarks Hill Lake trophic state chlorophyll" "Georgia EPD Clarks Hill monitoring".
  priority: high

- research_track: l3_algal_blooms_eutrophication
  chat_label: chat-algal-blooms
  search_profile: monitoring_sources
  target_intent: contextual_intelligence
  research_question: >
    What is the documented history of algal blooms and eutrophication concerns
    at Clarks Hill Lake, and what nutrient loading sources contribute to them?
  task_prompt: >
    Search for documented algal bloom events at Clarks Hill Lake / J. Strom Thurmond Reservoir.
    The study explicitly identifies "periodic algal bloom concern" as a key motivation.
    Find USACE, EPA, or state agency reports on cyanobacteria blooms at Clarks Hill.
    Search for harmful algal bloom (HAB) advisories issued by Georgia EPD or SC DHEC
    for Clarks Hill Lake.
    Find nutrient loading estimates (nitrogen, phosphorus) from the watershed —
    relevant to internal nutrient loading from sediments (which is what the
    sediment study ultimately addresses).
    Search for any total maximum daily load (TMDL) studies for Clarks Hill.
    Look for publications on seasonal dissolved oxygen depletion patterns,
    which connect to iron mobilization from sediments (Fe-DO coupling in slide 7).
    Target sources: Georgia EPD, SC DHEC, EPA ATTAINS (epa.gov/waterdata/attains),
    Google Scholar, USACE Savannah District environmental reports.
    Queries: "Clarks Hill Lake algal bloom cyanobacteria" "J. Strom Thurmond eutrophication"
    "Clarks Hill Lake TMDL phosphorus" "Clarks Hill Lake dissolved oxygen stratification"
    "Savannah River reservoir nutrient loading".
  priority: medium

- research_track: l3_sediment_transport_literature
  chat_label: chat-sediment-literature
  search_profile: academic_knowledge
  target_intent: academic_knowledge
  research_question: >
    What academic studies have investigated sediment transport, deposition, and
    geochemistry in Clarks Hill Lake or comparable southeastern US Piedmont reservoirs?
  task_prompt: >
    Search for peer-reviewed literature on sediment dynamics at Clarks Hill Lake
    or J. Strom Thurmond Reservoir — particularly studies on:
    - suspended sediment concentrations and transport
    - sedimentation rates and trap efficiency
    - spatial distribution of sediment types (fine vs coarse)
    - iron geochemistry in reservoir sediments
    - organic carbon storage in reservoir sediments
    Search for comparable studies in southeastern US Piedmont reservoirs that
    share similar watershed geology (granite/gneiss, kaolinitic soils) with Clarks Hill.
    The Piedmont geological setting is important: iron-rich soils (Georgia Red Clay)
    are a primary source of the high Fe concentrations measured (31,569–105,357 ppm).
    Search for USACE sedimentation surveys for Clarks Hill Dam (sedimentation
    reduces storage capacity over time — USACE periodically surveys this).
    Relevant keyword combinations:
    "Clarks Hill Lake sediment", "J. Strom Thurmond sedimentation",
    "Piedmont reservoir iron sediment Georgia", "southeastern reservoir iron organic carbon",
    "reservoir sediment trap efficiency Savannah River",
    "iron organic matter coupling freshwater sediment southeastern US".
    Target sources: Google Scholar, USACE Technical Reports (ERDC),
    Journal of Soils and Sediments, Limnology and Oceanography,
    Geochimica et Cosmochimica Acta.
  priority: medium
