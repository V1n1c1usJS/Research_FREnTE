# ============================================================
# Savannah River mainstem system - Search tracks for Research_FREnTE
# Study: river-first characterization, pollutant pressures, and sediment linkage
# ============================================================
# Organization: 3 levels x ~3-4 tracks = ~10 tracks total
# Priority: high > medium > low
# Suggested run: --max-searches 9 --limit 30 --llm-mode auto
# Temporal rule: always search for a 20-year historical window when the source allows it; if the source returns less, document the actual returned coverage but keep the ask at 20 years
# ============================================================

# ================================================================
# LEVEL 1 - PHYSICAL CONTEXT AND PRESSURES (MACRO)
# Basin characteristics, climate, land cover, and pollutant pressures
# ================================================================

- research_track: l1_basin_morphometry
  chat_label: chat-basin-morphometry
  search_profile: geospatial_data
  target_intent: dataset_discovery
  research_question: >
    What geospatial datasets are available to characterize the Savannah River
    mainstem corridor, its watershed, embedded reservoirs, and physical basin properties?
  task_prompt: >
    Search for watershed delineation data for the Savannah River basin above,
    within, and immediately below the Hartwell-Russell-Thurmond corridor.
    Find river-corridor morphometry, mainstem segmentation, valley setting,
    floodplain context, and reservoir morphometric data only as supporting controls.
    Include area-volume-depth (hypsometric) curves, bathymetric surveys, maximum
    and mean depth, shoreline length for Hartwell, Russell, and Thurmond when
    those metrics help interpret the river signal.
    Look for USGS StreamStats data for the Savannah River above the reservoir cascade.
    Find DEM data (SRTM 30m or 3DEP 10m) covering Hartwell, Russell, and Thurmond.
    Look for USACE technical reports on channel or reservoir sedimentation surveys
    that include bathymetric data relevant to the Savannah River system.
    Target sources: USGS StreamStats, USACE Savannah District reports,
    USGS EarthExplorer (earthexplorer.usgs.gov), USACE National Inventory of Dams.
    Also search: "J. Strom Thurmond reservoir morphometry" "Hartwell Lake bathymetry"
    "Richard B Russell Lake bathymetry" "Savannah River basin delineation USGS".
  priority: high

- research_track: l1_land_cover_watershed
  chat_label: chat-nlcd-land-cover
  search_profile: geospatial_data
  target_intent: dataset_discovery
  research_question: >
    What land cover, land use, and watershed pressure data exist for the Savannah
    River watershed, and how have they changed over time?
  task_prompt: >
    Search for NLCD (National Land Cover Database) data covering the Savannah River
    basin upstream of and surrounding the Hartwell-Russell-Thurmond corridor.
    Target NLCD years: 2001, 2006, 2011, 2016, 2019, 2021 (change detection).
    Key land cover classes for this region: deciduous forest, evergreen forest,
    mixed forest, cultivated crops, pasture/hay, woody wetlands, developed areas.
    Find watershed-level land cover summaries if available (% forest, % agriculture).
    Search for Georgia and South Carolina agricultural statistics (USDA NASS),
    urban-growth indicators, and watershed pressure summaries for counties that
    materially influence the Savannah River mainstem.
    Also look for USGS, EPA, or USACE reports on non-point source pollution from
    agricultural, urban, forestry, or industrial areas affecting the river.
    Target sources: MRLC.gov (NLCD), USDA NASS, Georgia DNR, DES/SC agencies.
    Queries: "NLCD Savannah River watershed" "Savannah River watershed pressure"
    "Hartwell watershed land cover" "Richard B Russell watershed land use"
    "Savannah River nonpoint source pollution".
  priority: medium

- research_track: l1_pollutant_pressures_mainstem
  chat_label: chat-pollutant-pressures
  search_profile: official_data_portals
  target_intent: dataset_discovery
  research_question: >
    What official datasets describe pollutant sources and environmental pressures
    affecting the Savannah River mainstem over the last 20 years?
  task_prompt: >
    Search for EPA ECHO, ATTAINS, 303(d), and TMDL datasets covering the Savannah
    River mainstem and the corridor influenced by Hartwell, Russell, and Thurmond.
    Target a 20-year historical window whenever the source allows it.
    Look for point-source dischargers, NPDES permits, wastewater treatment plants,
    industrial outfalls, impaired reaches, pollutants of concern, historical
    compliance trends, and watershed pressure summaries.
    Treat the following contaminant history as search hypotheses to verify with official
    or institutional sources: heavy metals, PAHs, PCBs, organochlorine pesticides,
    butyltins, PFAS/PFOA/PFOS, radionuclides including tritium, bacteria such as E. coli,
    and industrial particulates or plastic-related releases.
    Look for periodized evidence when possible:
    - 1940s-1970s industrial buildup in sediment, water, or biota
    - 1980s-1990s legacy residues after regulation
    - 2000-2026 persistent or emerging issues in the river corridor
    Search for Georgia and South Carolina state datasets that identify pollutant
    loads, permitted discharges, or environmental stressors entering the river.
    Prioritize mainstem or near-mainstem sources over generic watershed summaries.
    Explicitly search for local modern pollutant sources and public reports:
    - savannahwaterquality.com/archive
    - savannahwaterquality.com/pfas
    - savannahriverkeeper.org/program-overview
    - savannahriverkeeper.org/forever-chemicals
    - SRNS / DOE / SRS environmental reports
    - ScienceBase USGS Savannah 2020 data release
    Target sources: echo.epa.gov, EPA ATTAINS, EPA Reach Address Database,
    Georgia EPD, South Carolina environmental agencies, USGS reports that quantify
    nutrient or suspended-sediment loading, NOAA contaminant archives, and Savannah
    Riverkeeper datasets or dashboards when they point to downloadable evidence.
    Queries: "Savannah River ECHO discharge" "Savannah River ATTAINS impairment"
    "Savannah River NPDES Georgia South Carolina" "Savannah River TMDL nutrients"
    "Savannah River pollutant sources" "Savannah River PCB mercury PAH NOAA"
    "Savannah River PFAS Riverkeeper" "Savannah River tritium radionuclide monitoring"
    "savannahwaterquality PFAS Savannah intake" "Savannah Riverkeeper forever chemicals"
    "SRNS tritium Savannah River annual report" "ScienceBase Savannah River 2020".
  priority: high

- research_track: l1_climate_precipitation
  chat_label: chat-climate-precip
  search_profile: monitoring_sources
  target_intent: dataset_discovery
  research_question: >
    What long-term climate and precipitation data are available for the
    Savannah River corridor region (Georgia-South Carolina Piedmont)?
  task_prompt: >
    Search for precipitation and temperature records covering the Savannah River
    basin upstream of Thurmond Dam.
    Target a 20-year historical window at minimum when the source allows it.
    Target NOAA Climate Data Online (CDO) stations near the system:
    Augusta, GA (GHCND:USW00003820), Hartwell region, Clarks Hill, SC,
    McCormick, SC, and Thomson, GA.
    Look for monthly and annual precipitation normals and anomalies (1991-2020 normal).
    Search for drought index data (PDSI, SPI) for the region - relevant for
    explaining pool elevation variability and low inflow periods.
    Find PRISM or Daymet gridded climate data for the watershed.
    Search for studies linking precipitation patterns to inflow and pool level
    fluctuations across Hartwell, Russell, and Thurmond.
    Target sources: NOAA CDO (ncdc.noaa.gov/cdo-web), PRISM Climate Group,
    Daymet (daymet.ornl.gov), SE Climate Consortium.
    Queries: "precipitation Savannah River basin" "drought Clarks Hill Lake"
    "Hartwell reservoir drought" "Georgia Piedmont climate hydrology".
  priority: medium

# ================================================================
# LEVEL 2 - MAINSTEM RIVER SIGNAL AND SUPPORTING OPERATIONS
# The river signal is the analytical core; reservoirs explain part of it
# ================================================================

- research_track: l2_usace_operations
  chat_label: chat-usace-pool-storage
  search_profile: official_data_portals
  target_intent: dataset_discovery
  research_question: >
    What operational data (pool elevation, storage volume, inflow, outflow,
    releases) does USACE publish for the dams and reservoirs that modulate the
    Savannah River mainstem in the Hartwell-Russell-Thurmond corridor?
  task_prompt: >
    Search for USACE Savannah District water management data for Hartwell Dam,
    Richard B. Russell Dam, and J. Strom Thurmond Dam.
    Target at least 20 years of historical coverage when the source allows it.
    Find the official portal for daily pool elevation (ft MSL) and storage volume (acre-ft)
    for all three reservoirs, not only Thurmond.
    Look for historical pool elevation records - ideally 10+ years daily data.
    Find inflow and outflow (powerhouse + spillway) discharge records for the cascade.
    Search the USACE AquaLink Water Control Data System (water.usace.army.mil)
    for Hartwell, Russell, and Thurmond station codes and data download options.
    Find USACE Water Control Manual or Master Plan documents that explain
    coordinated operation across the three reservoirs.
    Look for seasonal pool management patterns and evidence of upstream regulation
    propagating into the Savannah River signal and into Thurmond operations.
    Target sources: sas.usace.army.mil (Savannah District),
    water.usace.army.mil (AquaLink), USACE published reports.
    Queries: "Hartwell lake operations data" "Richard B Russell dam pool elevation"
    "Clarks Hill Dam water control" "J. Strom Thurmond pool elevation data"
    "USACE Savannah District reservoir operations data download"
    "Savannah River cascade reservoir operations".
  priority: high

- research_track: l2_streamflow_inflows
  chat_label: chat-usgs-nws-inflows
  search_profile: monitoring_sources
  target_intent: dataset_discovery
  research_question: >
    What mainstem Savannah River streamflow, stage, and level data are available
    from USGS and NWS across, between, and below Hartwell, Russell, and Thurmond?
  task_prompt: >
    START HERE: prioritize mainstem Savannah River monitoring across the cascade.
    Target at least 20 years of historical coverage whenever USGS/NWS endpoints allow it.
    1) NWS SERFC Clarks Hill Dam inflows: https://www.weather.gov/serfc/inflows_chds1
       - find what historical data format is available, download options, and time period.
    2) USGS monitoring location 02193900: https://waterdata.usgs.gov/monitoring-location/USGS-02193900/
       - identify the parameter codes available (discharge, stage, water quality),
       the period of record, and how to access data via USGS NWIS API.
    Also search for other USGS gauges that support the mainstem Savannah signal:
    - river context above Hartwell
    - river context between Hartwell and Russell
    - river context between Russell and Thurmond
    - river context below Thurmond toward Augusta
    - low-flow or chemistry-support stations such as `021973269` when they strengthen
      the modern river signal
    - tributaries only when they materially explain shifts in the mainstem signal
    Find the USGS NWIS REST API endpoints for daily discharge data (parameter 00060)
    and stage data (parameter 00065) for the identified gauges.
    Prefer gauges with daily or sub-daily continuity and document data format (JSON/RDB/CSV)
    and time series coverage.
    Target sources: waterdata.usgs.gov/nwis, water.weather.gov/ahps,
    https://www.weather.gov/serfc/inflows_chds1.
    Queries: "USGS 02193900 Savannah River discharge" "NWS SERFC CHDS1 inflow data"
    "Savannah River Augusta gauge stage" "Savannah River below Thurmond USGS gauge"
    "Hartwell Russell Thurmond mainstem gauge" "Savannah River cascade historical USGS".
  priority: high

- research_track: l2_mainstem_water_quality_sediment
  chat_label: chat-river-quality-sediment
  search_profile: monitoring_sources
  target_intent: dataset_discovery
  research_question: >
    What river-centric water-quality, sediment, turbidity, or suspended-solids data
    exist for the Savannah River mainstem across and below the Hartwell-Russell-Thurmond cascade?
  task_prompt: >
    Search USGS NWIS and the Water Quality Portal for mainstem Savannah River stations
    that expose river-reach water quality or sediment context across the cascade.
    Target at least 20 years of historical coverage whenever the endpoint allows it.
    When modern chemistry is sparse, issue parameter-guided searches in WQP or related
    portals for:
    - PFAS / PFOA / PFOS
    - E. coli / fecal coliform
    - aluminum, chromium, zinc, mercury, arsenic, cadmium
    - total suspended solids / suspended sediment / turbidity
    - nitrogen, phosphorus, BOD, COD
    Prioritize parameters that help explain the river signal:
    - turbidity
    - suspended sediment concentration
    - total suspended solids
    - discharge-linked sediment proxies
    - dissolved oxygen
    - conductivity
    - temperature
    - nutrients when sampled in river reaches
    Focus first on mainstem Savannah River locations near or below Thurmond and toward Augusta,
    then on upstream mainstem reaches around Hartwell and Russell.
    Treat reservoir stations as supporting annexes only when they help interpret the river signal.
    Document the endpoint, parameter codes, period of record, data format, and whether the site is
    mainstem, tributary, or reservoir-adjacent.
    Target sources: waterqualitydata.us, waterdata.usgs.gov/nwis.
    Queries: "Savannah River suspended sediment USGS" "Savannah River turbidity Augusta"
    "Savannah River water quality below Thurmond" "Savannah River total suspended solids USGS".
  priority: high

- research_track: l2_residence_time_hydrodynamics
  chat_label: chat-residence-time
  search_profile: academic_knowledge
  target_intent: contextual_intelligence
  research_question: >
    What is the estimated water residence time of Thurmond Lake, and how is it
    conditioned by the upstream Hartwell-Russell-Thurmond operating cascade?
  task_prompt: >
    Search for published estimates of water residence time (hydraulic retention time)
    for Clarks Hill Lake / J. Strom Thurmond Reservoir.
    Formula reference: TR = Volume (m3) / Outflow (m3/day).
    Reservoir capacity: ~2.8 km3 (2.26 million acre-ft) at full pool.
    Look for studies that model spatial variation in residence time within the lake
    (riverine zone near inflow vs lacustrine zone near dam), but also look for
    operational papers or manuals that explain how Hartwell and Russell regulation
    modifies Thurmond throughput.
    Find USACE or academic studies on thermal stratification and mixing regimes
    in Clarks Hill - relevant to low-energy depositional zone identification.
    Search for hydrodynamic models applied to Clarks Hill (CE-QUAL-W2 or similar).
    Key concept for the research: low-energy zones (longer residence time) correspond
    to fine-sediment accumulation zones where iron and organic carbon concentrate.
    Target sources: Google Scholar, USACE technical reports, USGS Water Resources Investigation Reports.
    Queries: "Clarks Hill Lake residence time" "J. Strom Thurmond hydraulic retention"
    "Hartwell Russell Thurmond operations residence time"
    "Savannah River reservoir hydrodynamics stratification"
    "CE-QUAL-W2 Thurmond Lake" "Clarks Hill Lake mixing".
  priority: high

# ================================================================
# LEVEL 3 - WATER QUALITY, POLLUTANTS, AND ECOLOGICAL CONTEXT
# Physical and chemical conditions relevant to river behavior and sediment biogeochemistry
# ================================================================

- research_track: l3_water_quality_historical
  chat_label: chat-water-quality-epa
  search_profile: monitoring_sources
  target_intent: dataset_discovery
  research_question: >
    What historical water quality data (DO, pH, temperature, turbidity, nutrients,
    chlorophyll-a) exist for the Savannah River mainstem and supporting stations
    across Hartwell, Russell, and Thurmond?
  task_prompt: >
    Search the EPA Water Quality Portal (waterqualitydata.us) for sampling data
    in the Savannah River mainstem first, then in Hartwell Lake, Richard B. Russell
    Lake, and J. Strom Thurmond Reservoir as supporting stations.
    Target a 20-year historical window when the portal or endpoint allows date filtering.
    Use river or stream site types first, then "Lake, Reservoir, Impoundment"
    only when reservoir stations help interpret the river response.
    Find USGS NWIS water quality data (parameter codes: 00300 DO, 00400 pH,
    00010 temperature, 00076 turbidity, 00665 total phosphorus,
    00618 nitrate, 32209 chlorophyll-a) at or near the three reservoirs.
    Also search for mainstem chemistry tied to pollutant interpretation:
    metals, trace elements, microbiological indicators, organic carbon, PFAS,
    radionuclides, and sediment-associated contaminants where the source exposes them.
    Search for mainstem stations near Calhoun Falls, below Hartwell, below Russell,
    below Thurmond, and Augusta reach.
    Search for Georgia EPD monitoring data for the Savannah system.
    Search for South Carolina water-quality assessments on the South Carolina side.
    Search for City of Savannah PFAS and archive reports tied to the Savannah intake.
    Search for Riverkeeper dashboards or ArcGIS layers that expose exportable modern
    chemistry for the mainstem.
    Search for SRNS / DOE / SRS monitoring with river-relevant radionuclide or
    contaminant context.
    Use this chronology only as a guide for what to look for, not as confirmed evidence:
    early industrial contaminants in sediment and biota, post-regulation legacy residues,
    and modern PFAS / radionuclide / bacteria concerns.
    Find any long-term trophic state assessments (TSI, Carlson's index) for river-
    reservoir transition zones, Thurmond, and any supporting records for Hartwell and Russell.
    Target sources: waterqualitydata.us, waterdata.usgs.gov/nwis,
    epd.georgia.gov, des.sc.gov, NOAA contaminant programs, Savannah Riverkeeper,
    and DOE / SRS monitoring where they provide river-relevant data.
    Queries: "Savannah River water quality EPA" "Savannah River Augusta DO nutrients"
    "Clarks Hill Lake water quality EPA" "Hartwell lake DO nutrients"
    "Richard B Russell reservoir chlorophyll" "Georgia EPD Savannah River monitoring"
    "Savannah River PFAS water quality" "Savannah River radionuclide monitoring".
  priority: high

- research_track: l3_algal_blooms_eutrophication
  chat_label: chat-algal-blooms
  search_profile: monitoring_sources
  target_intent: contextual_intelligence
  research_question: >
    What is the documented history of algal blooms, eutrophication, and nutrient
    pressure along the Savannah River-reservoir continuum, especially at Thurmond?
  task_prompt: >
    Search for documented algal bloom events at Clarks Hill Lake / J. Strom Thurmond Reservoir
    and any related upstream reservoir records for Hartwell and Russell.
    The study explicitly identifies "periodic algal bloom concern" as a key motivation.
    Find USACE, EPA, or state agency reports on cyanobacteria blooms in the system.
    Search for harmful algal bloom advisories issued by Georgia EPD or South Carolina agencies.
    Find nutrient loading estimates (nitrogen, phosphorus) from the watershed and
    from point or non-point sources affecting the river corridor - relevant to
    internal nutrient loading from sediments.
    Search for any total maximum daily load (TMDL) studies linked to the Savannah cascade.
    Look for publications on seasonal dissolved oxygen depletion patterns,
    which connect to iron mobilization from sediments.
    Target sources: Georgia EPD, EPA ATTAINS, Google Scholar, USACE Savannah District environmental reports.
    Queries: "Clarks Hill Lake algal bloom cyanobacteria" "J. Strom Thurmond eutrophication"
    "Hartwell reservoir algal bloom" "Savannah River reservoir nutrient loading".
  priority: medium

- research_track: l3_sediment_transport_literature
  chat_label: chat-sediment-literature
  search_profile: academic_knowledge
  target_intent: academic_knowledge
  research_question: >
    What academic studies have investigated sediment transport, deposition, and
    geochemistry in the Savannah River/Thurmond system and comparable southeastern
    US Piedmont reservoirs, including links to Hartwell and Russell operations?
  task_prompt: >
    Search for peer-reviewed literature on sediment dynamics at Clarks Hill Lake
    or J. Strom Thurmond Reservoir - particularly studies on:
    - suspended sediment concentrations and transport
    - sedimentation rates and trap efficiency
    - spatial distribution of sediment types (fine vs coarse)
    - iron geochemistry in reservoir sediments
    - organic carbon storage in reservoir sediments
    Search for comparable studies in southeastern US Piedmont rivers and reservoirs that
    share similar watershed geology (granite/gneiss, kaolinitic soils) with Thurmond.
    Search for studies or technical reports explaining how upstream regulation by
    Hartwell and Russell modifies depositional and hydrodynamic conditions in Thurmond.
    Search for USACE sedimentation surveys for Clarks Hill Dam.
    Relevant keyword combinations:
    "Clarks Hill Lake sediment", "J. Strom Thurmond sedimentation",
    "Hartwell Russell Thurmond operations sediment",
    "Piedmont reservoir iron sediment Georgia", "southeastern reservoir iron organic carbon",
    "reservoir sediment trap efficiency Savannah River",
    "iron organic matter coupling freshwater sediment southeastern US".
    Target sources: Google Scholar, USACE Technical Reports (ERDC),
    Journal of Soils and Sediments, Limnology and Oceanography,
    Geochimica et Cosmochimica Acta.
  priority: medium
