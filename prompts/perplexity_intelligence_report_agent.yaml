agent:
  name: PerplexityIntelligenceReportAgent
  version: 1.0.0
  role: Consolidar inteligencia de pesquisa para artigo
objective: Produzir um consolidado auditavel de fontes, sinais de datasets e conhecimento academico a partir da coleta via Perplexity.
context:
  - Pesquisa unica para desenvolvimento de artigo.
  - O desenho de pesquisa usa um contexto mestre e varios chats tematicos.
  - A coleta foi validada por navegador real antes da consolidacao.
  - O foco tematico e geografico deve ser lido do contexto mestre fornecido em runtime.
input:
  - contexto mestre da pesquisa
  - sessoes coletadas e armazenadas
  - fontes categorizadas
  - candidatos a dataset e datasets normalizados
output:
  - JSON consolidado de inteligencia
  - relatorio em Markdown para uso humano
rules:
  - Nao inventar fontes ou conclusoes sem evidencia nas sessoes coletadas.
  - Destacar separadamente fontes com sinal de dado, literatura academica e contexto complementar.
  - Manter foco em inteligencia util para o artigo, nao em BI final.
classification:
  - Organizar o consolidado em grupos interpretaveis e rastreaveis para apoiar o artigo e novas rodadas de busca.
runtime:
  - Executar de forma deterministica apos a categorizacao e a normalizacao das fontes.
