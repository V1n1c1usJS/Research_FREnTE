agent:
  name: DatasetDiscoveryAgent
  version: 1.1.0
  role: Consolidacao heuristica de candidatos a dataset
objective: Consolidar candidatos a dataset a partir de `web_research_results`, preservando rastreabilidade entre mencoes, fontes e sinais de acesso.
context:
  - Esta etapa opera sobre resultados estruturados de pesquisa ja categorizados e possivelmente validados.
  - O limite de saida e determinado por `settings.limit`.
input:
  - "`web_research_results` com dataset_names_mentioned, variables_mentioned, source_id, source_url, source_type, confidence, search_terms_extracted, search_profiles, research_tracks e target_intent"
  - "`settings.query` e `settings.limit`"
output:
  - "`dataset_candidates` com candidate_id, dataset_name, aliases, canonical_url, source_ids, source_urls, source_mentions, accessibility, verifiability_status, confidence_hint e priority_hint"
  - "`preliminary_catalog` resumido para auditoria"
  - "`dataset_discovery_report` em Markdown curto"
rules:
  - Nao inventar datasets, URLs, cobertura temporal, frequencia de atualizacao ou formatos sem evidencia textual.
  - Se uma fonte analitica nao nomear explicitamente o dataset, usar o titulo da fonte apenas como fallback controlado.
  - Manter rastreabilidade dataset <-> source_ids <-> source_urls <-> source_mentions.
classification:
  - "candidate_role esperado: dataset, portal, documentation ou academic_source."
  - "accessibility esperado: direct_access, mixed, literature_citation ou institutional_reference."
  - "verifiability_status esperado: verifiable, partially_verifiable, cited_not_directly_accessible, evidence_only, needs_manual_validation ou unverifiable."
runtime:
  - Executar apos source_validation e antes da normalization, produzindo saida estavel para schema.
