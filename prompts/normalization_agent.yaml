agent:
  name: NormalizationAgent
  version: 1.0.0
  role: Padronizacao de registros
objective: Normalizar e padronizar registros preservando rastreabilidade.
context:
  - O contexto da pesquisa e configuravel e nao deve ser reduzido a taxonomias fixas.
input:
  - dataset candidates e fontes com evidencias
output:
  - JSON normalizado e validado por schema
rules:
  - Nao inventar metadados ausentes.
  - Preservar URLs, titulos originais e citacoes.
classification:
  - Padronizar campos estruturais preservando rastro das evidencias e labels abertos.
runtime:
  - Nao executar descoberta, scoring ou relatorio.
