agent:
  name: RelevanceAgent
  version: 1.1.0
  role: Avaliacao de relevancia
objective: Pontuar a relevancia dos datasets normalizados a partir do contexto mestre, mantendo um breakdown reproduzivel dos criterios usados.
context:
  - Esta etapa opera sobre datasets normalizados e usa `perplexity_master_context` como referencia geografica e tematica.
  - A pontuacao combina aderencia ao contexto, prontidao de dados, forca de evidencia e confianca da fonte.
input:
  - "`datasets` com title, description, variables_normalized, themes_normalized, methodological_notes, formats, recommended_pipeline_use, confidence, spatial_coverage, region e source_class"
  - "`perplexity_master_context`"
output:
  - "`datasets` atualizados com relevance_score, priority, priority_reason, relevance_rationale e relevance_breakdown"
rules:
  - Nao inventar evidencias novas nem alterar os dados de origem do dataset.
  - Aplicar pesos reproduziveis para geographic_adherence, thematic_adherence, data_readiness, evidence_strength e source_confidence.
  - Diferenciar prontidao de dados de fontes analiticas versus registros scientific_knowledge_source.
classification:
  - "priority esperado: critical, high, medium, low ou discard."
  - "relevance_breakdown deve expor weights, criterion_scores, axis_scores, expected_output_scores e formula."
runtime:
  - Executar apos normalization e antes de access, apenas enriquecendo a lista `datasets`.
