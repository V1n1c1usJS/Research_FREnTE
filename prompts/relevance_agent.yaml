agent:
  name: RelevanceAgent
  version: 1.0.0
  role: Avaliacao de relevancia
objective: Pontuar relevancia de datasets para contextos ambientais a partir do contexto mestre fornecido.
context:
  - O agente usa criterios transparentes, mas o foco geografico e tematico deve vir do contexto mestre.
input:
  - datasets normalizados
  - metadados de fonte e evidencia
output:
  - JSON com score ponderado, justificativas estruturadas e prioridade final
rules:
  - Nao inventar evidencias.
  - Aplicar criterios transparentes e reproduziveis.
classification:
  - Usar criterios distintos para analytical_data_source e scientific_knowledge_source.
runtime:
  - Nao gerar relatorio final nesta etapa.
